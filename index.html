<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive World Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root { --gold: #C8A84B; --gold2: #E8C86A; --text: #C8D8F0; --text-dim: #607898; --deep: #080D14; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #04080F; color: var(--text); font-family: 'Georgia', serif; overflow: hidden; height: 100vh; width: 100vw; user-select: none; -webkit-user-select: none; }
#root { width: 100%; height: 100%; }
.app-shell { position: relative; width: 100%; height: 100%; overflow: hidden; }
.map-viewport { position: absolute; inset: 0; overflow: hidden; cursor: grab; }
.map-viewport.dragging { cursor: grabbing; }
.map-transform-layer { position: absolute; transform-origin: 0 0; will-change: transform; }
.map-svg { display: block; overflow: visible; }
.region-path { cursor: pointer; stroke-linejoin: round; stroke-linecap: round; transition: fill 0.22s ease, stroke 0.22s ease, stroke-width 0.18s ease, filter 0.28s ease; }
.region-path:focus-visible { outline: none; stroke-width: 3; stroke: var(--gold2); filter: brightness(1.4); }
.region-tooltip { position: fixed; pointer-events: none; z-index: 1000; transform: translate(-50%, calc(-100% - 10px)); background: rgba(5,10,22,0.93); border: 1px solid rgba(200,168,75,0.35); border-radius: 3px; padding: 9px 14px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); opacity: 0; transition: opacity 0.18s ease, transform 0.18s ease; }
.region-tooltip.visible { opacity: 1; transform: translate(-50%, calc(-100% - 18px)); }
.tt-name { font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold2); white-space: nowrap; }
.tt-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; font-style: italic; }
.tt-sep { height: 1px; background: linear-gradient(90deg,transparent,rgba(200,168,75,.4),transparent); margin: 5px 0; }
.tt-hint { font-size: 10px; color: rgba(100,130,170,.7); letter-spacing: .03em; }
@keyframes ripple-expand { from { r: 0; opacity: .8; } to { r: 80; opacity: 0; } }
.click-ripple { animation: ripple-expand 0.5s ease-out forwards; }
.vignette-overlay { position: fixed; inset: 0; background: radial-gradient(ellipse at center, transparent 35%, rgba(2,5,12,.75) 100%); pointer-events: none; z-index: 10; }
.ui-chrome { position: fixed; inset: 0; pointer-events: none; z-index: 20; }
.map-title { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); text-align: center; }
.map-title-text { font-size: 12px; letter-spacing: .35em; text-transform: uppercase; color: var(--gold); opacity: .8; }
.map-title-sub { font-size: 9px; color: var(--text-dim); letter-spacing: .2em; text-transform: uppercase; margin-top: 3px; opacity: .5; }
.title-rule { width: 70px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); margin: 5px auto 0; opacity: .5; }
.zoom-controls { position: absolute; bottom: 32px; right: 28px; display: flex; flex-direction: column; gap: 2px; pointer-events: all; }
.zoom-btn { width: 34px; height: 34px; background: rgba(10,18,32,.88); border: 1px solid rgba(200,168,75,.22); color: var(--gold); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 2px; transition: background .15s, border-color .15s; font-family: 'Georgia', serif; }
.zoom-btn:hover { background: rgba(200,168,75,.12); border-color: rgba(200,168,75,.55); }
.zoom-btn:active { transform: scale(0.92); }
.compass { position: absolute; bottom: 32px; left: 28px; width: 46px; height: 46px; opacity: .4; }
.region-panel { position: absolute; top: 0; right: 0; width: 270px; height: 100%; background: rgba(4,8,18,.93); border-left: 1px solid rgba(200,168,75,.18); padding: 72px 26px 40px; pointer-events: all; transform: translateX(100%); transition: transform .4s cubic-bezier(.25,.46,.45,.94); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); overflow-y: auto; }
.region-panel.open { transform: translateX(0); }
.panel-close { position: absolute; top: 22px; right: 18px; width: 26px; height: 26px; background: none; border: 1px solid rgba(200,168,75,.22); color: var(--text-dim); cursor: pointer; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s; }
.panel-close:hover { border-color: var(--gold); color: var(--gold); }
.panel-name { font-size: 18px; color: var(--gold2); letter-spacing: .09em; text-transform: uppercase; line-height: 1.2; margin-bottom: 3px; }
.panel-sub { font-size: 10px; letter-spacing: .18em; color: var(--text-dim); text-transform: uppercase; }
.panel-sep { width: 42px; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); margin: 10px 0; opacity: .6; }
.panel-lore { font-size: 12px; color: rgba(180,200,230,.7); line-height: 1.75; font-style: italic; margin-bottom: 18px; }
.panel-stats { display: flex; flex-direction: column; gap: 9px; margin-bottom: 22px; }
.panel-stat { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,.055); padding-bottom: 9px; }
.stat-label { font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: var(--text-dim); }
.stat-value { font-size: 12px; color: var(--text); }
.panel-btn { display: block; width: 100%; padding: 10px; background: rgba(200,168,75,.07); border: 1px solid rgba(200,168,75,.32); color: var(--gold); font-family: 'Georgia', serif; font-size: 10px; letter-spacing: .22em; text-transform: uppercase; text-align: center; cursor: pointer; border-radius: 2px; transition: background .2s, border-color .2s; text-decoration: none; }
.panel-btn:hover { background: rgba(200,168,75,.17); border-color: rgba(200,168,75,.6); }
.region-page { position: fixed; inset: 0; background: var(--deep); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 18px; animation: page-in .45s ease; }
@keyframes page-in { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: scale(1); } }
.page-back { position: absolute; top: 28px; left: 28px; background: none; border: 1px solid rgba(200,168,75,.28); color: var(--gold); padding: 7px 16px; font-family: 'Georgia', serif; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; cursor: pointer; border-radius: 2px; transition: all .15s; }
.page-back:hover { background: rgba(200,168,75,.1); border-color: var(--gold); }
.page-name { font-size: 38px; color: var(--gold2); letter-spacing: .12em; text-transform: uppercase; }
.page-rule { width: 100px; height: 1px; background: linear-gradient(90deg,transparent,var(--gold),transparent); opacity: .5; }
.page-slug { font-size: 10px; color: var(--text-dim); letter-spacing: .25em; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: rgba(200,168,75,.18); border-radius: 2px; }
@media (max-width:600px) { .region-panel { width: 100%; } .compass { display: none; } }
</style>

<script type="text/babel">

const { useState, useRef, useEffect, useCallback } = React;
const REGIONS = window.REGIONS_DATA;
const MAP_W = window.MAP_W, MAP_H = window.MAP_H;
const MIN_SCALE = 0.35, MAX_SCALE = 4.0;
const INERTIA_FRICTION = 0.88, INERTIA_THRESHOLD = 0.28;
const clamp = (v,lo,hi) => Math.min(Math.max(v,lo),hi);

function RegionTooltip({region, x, y, visible}) {
  if (!region) return null;
  return (
    <div className={`region-tooltip ${visible?'visible':''}`} style={{left:x, top:y}}>
      <div className="tt-name">{region.name}</div>
      <div className="tt-sub">{region.subtitle}</div>
      <div className="tt-sep"/>
      <div className="tt-hint">Click to explore</div>
    </div>
  );
}

function MapRegion({region, isHovered, isActive, onHover, onLeave, onClick, scale}) {
  const showLabel = scale > 0.48;
  const labelOpacity = Math.min(1, (scale - 0.48) / 0.15);
  const glowFilter = (isHovered || isActive)
    ? `drop-shadow(0 0 10px ${region.glow}) drop-shadow(0 0 22px ${region.glow})`
    : 'none';
  return (
    <g role="button" tabIndex={0}
      aria-label={`${region.name}: ${region.subtitle}. Press Enter to explore.`}
      onMouseEnter={()=>onHover(region)}
      onMouseLeave={onLeave}
      onClick={()=>onClick(region)}
      onKeyDown={e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();onClick(region);}}}>
      <path className="region-path" d={region.path}
        fill={isHovered||isActive ? region.hoverFill : region.fill}
        stroke={isHovered||isActive ? region.stroke : 'rgba(255,255,255,0.07)'}
        strokeWidth={isHovered||isActive ? 2 : 0.8}
        style={{filter: glowFilter}}
      />
      {showLabel && (
        <g style={{opacity: labelOpacity, pointerEvents:'none'}}>
          <text x={region.labelX} y={region.labelY - 8}
            textAnchor="middle" dominantBaseline="middle"
            fontFamily="Georgia, serif"
            fontSize={isHovered ? 20 : 17}
            fill={isHovered ? '#E8C86A' : 'rgba(220,232,252,0.88)'}
            style={{
              filter: isHovered
                ? 'drop-shadow(0 0 8px rgba(232,200,106,.7)) drop-shadow(0 2px 4px rgba(0,0,0,.95))'
                : 'drop-shadow(0 1px 4px rgba(0,0,0,.95))',
              textTransform:'uppercase', letterSpacing:'0.08em',
            }}>
            {region.name.toUpperCase()}
          </text>
          <text x={region.labelX} y={region.labelY + 12}
            textAnchor="middle" dominantBaseline="middle"
            fontFamily="Georgia, serif" fontStyle="italic" fontSize={11}
            fill="rgba(160,185,220,0.52)"
            style={{filter:'drop-shadow(0 1px 3px rgba(0,0,0,.95))'}}>
            {region.subtitle}
          </text>
        </g>
      )}
    </g>
  );
}

function RegionPanel({region, onClose, onNavigate}) {
  return (
    <div className={`region-panel ${region?'open':''}`}>
      {region && (<>
        <button className="panel-close" onClick={onClose} aria-label="Close">✕</button>
        <div className="panel-name">{region.name}</div>
        <div className="panel-sub">{region.subtitle}</div>
        <div className="panel-sep"/>
        <p className="panel-lore">{region.lore}</p>
        <div className="panel-stats">
          {region.stats.map(([l,v])=>(
            <div className="panel-stat" key={l}>
              <span className="stat-label">{l}</span>
              <span className="stat-value">{v}</span>
            </div>
          ))}
        </div>
        <a href={`#/regions/${region.slug}`} className="panel-btn"
          onClick={e=>{e.preventDefault();onNavigate(region);}}>
          Explore Region →
        </a>
      </>)}
    </div>
  );
}

function Compass() {
  return (
    <svg className="compass" viewBox="0 0 52 52" fill="none" aria-hidden="true">
      <circle cx="26" cy="26" r="23" stroke="rgba(200,168,75,.4)" strokeWidth=".8"/>
      <polygon points="26,5 22,26 26,23 30,26" fill="rgba(200,168,75,.9)"/>
      <polygon points="26,47 22,26 26,29 30,26" fill="rgba(100,130,180,.6)"/>
      <line x1="3" y1="26" x2="7" y2="26" stroke="rgba(200,168,75,.4)" strokeWidth="1"/>
      <line x1="45" y1="26" x2="49" y2="26" stroke="rgba(200,168,75,.4)" strokeWidth="1"/>
      <text x="26" y="13" textAnchor="middle" dominantBaseline="middle"
        fill="rgba(200,168,75,.8)" fontSize="7" fontFamily="Georgia">N</text>
    </svg>
  );
}

function MapViewport({children, scale, setScale, offset, setOffset}) {
  const ref = useRef(null);
  const drag = useRef({active:false});
  const vel = useRef({vx:0, vy:0, raf:null});
  const touch = useRef({lastDist:0});

  const constrain = useCallback((ox, oy, s) => {
    const vw = ref.current?.offsetWidth  ?? window.innerWidth;
    const vh = ref.current?.offsetHeight ?? window.innerHeight;
    const m = 80;
    return [
      clamp(ox, Math.min(m, vw - MAP_W*s + m), Math.max(vw - m, m)),
      clamp(oy, Math.min(m, vh - MAP_H*s + m), Math.max(vh - m, m)),
    ];
  }, []);

  useEffect(() => {
    const el = ref.current; if (!el) return;
    const onWheel = e => {
      e.preventDefault();
      const rect = el.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const delta = e.deltaMode===1 ? e.deltaY*20 : e.deltaY;
      const f = Math.exp(-delta * 0.001);
      const ns = clamp(scale * f, MIN_SCALE, MAX_SCALE);
      const r = ns / scale;
      const [cx,cy] = constrain(mx - r*(mx - offset[0]), my - r*(my - offset[1]), ns);
      setScale(ns); setOffset([cx,cy]);
    };
    el.addEventListener('wheel', onWheel, {passive:false});
    return () => el.removeEventListener('wheel', onWheel);
  }, [scale, offset, constrain, setScale, setOffset]);

  const stopVel = () => vel.current.raf && cancelAnimationFrame(vel.current.raf);
  const startVel = useCallback(() => {
    stopVel();
    const step = () => {
      vel.current.vx *= INERTIA_FRICTION;
      vel.current.vy *= INERTIA_FRICTION;
      if (Math.abs(vel.current.vx)<INERTIA_THRESHOLD && Math.abs(vel.current.vy)<INERTIA_THRESHOLD) return;
      setOffset(prev => constrain(prev[0]+vel.current.vx, prev[1]+vel.current.vy, scale));
      vel.current.raf = requestAnimationFrame(step);
    };
    vel.current.raf = requestAnimationFrame(step);
  }, [constrain, scale, setOffset]);

  const onMD = useCallback(e => {
    if(e.button!==0) return;
    stopVel();
    drag.current = {active:true, sx:e.clientX, sy:e.clientY, sox:offset[0], soy:offset[1], lx:e.clientX, ly:e.clientY};
    ref.current.classList.add('dragging');
  }, [offset]);

  const onMM = useCallback(e => {
    const d = drag.current; if(!d.active) return;
    vel.current.vx = e.clientX - d.lx; vel.current.vy = e.clientY - d.ly;
    d.lx = e.clientX; d.ly = e.clientY;
    setOffset(constrain(d.sox + e.clientX - d.sx, d.soy + e.clientY - d.sy, scale));
  }, [constrain, scale, setOffset]);

  const onMU = useCallback(() => {
    if(!drag.current.active) return;
    drag.current.active = false;
    ref.current.classList.remove('dragging');
    startVel();
  }, [startVel]);

  const onTS = useCallback(e => {
    stopVel();
    if(e.touches.length===2) {
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      touch.current.lastDist = Math.hypot(dx,dy);
    }
    if(e.touches.length===1) {
      drag.current = {active:true, sx:e.touches[0].clientX, sy:e.touches[0].clientY, sox:offset[0], soy:offset[1], lx:e.touches[0].clientX, ly:e.touches[0].clientY};
    }
  }, [offset]);

  const onTM = useCallback(e => {
    e.preventDefault();
    if(e.touches.length===2) {
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);
      const f=dist/touch.current.lastDist;
      touch.current.lastDist=dist;
      const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
      const ns=clamp(scale*f, MIN_SCALE, MAX_SCALE);
      const r=ns/scale;
      const [cx,cy]=constrain(mx-r*(mx-offset[0]), my-r*(my-offset[1]), ns);
      setScale(ns); setOffset([cx,cy]);
    } else if(e.touches.length===1 && drag.current.active) {
      const d=drag.current;
      const tx=e.touches[0].clientX, ty=e.touches[0].clientY;
      vel.current.vx=tx-d.lx; vel.current.vy=ty-d.ly;
      d.lx=tx; d.ly=ty;
      setOffset(constrain(d.sox+tx-d.sx, d.soy+ty-d.sy, scale));
    }
  }, [scale, offset, constrain, setScale, setOffset]);

  const onTE = useCallback(e => {
    drag.current.active=false;
    if(e.touches.length===0) startVel();
  }, [startVel]);

  return (
    <div ref={ref} className="map-viewport"
      onMouseDown={onMD} onMouseMove={onMM} onMouseUp={onMU} onMouseLeave={onMU}
      onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
      role="application" aria-label="Interactive world map">
      {children}
    </div>
  );
}

function RegionPage({region, onBack}) {
  return (
    <div className="region-page">
      <button className="page-back" onClick={onBack}>← Back to Map</button>
      <div style={{fontFamily:'Georgia',fontSize:10,letterSpacing:'.28em',color:'var(--text-dim)',textTransform:'uppercase'}}>Region</div>
      <div className="page-name">{region.name.toUpperCase()}</div>
      <div className="page-rule"/>
      <p style={{fontFamily:'Georgia',fontStyle:'italic',fontSize:13,color:'rgba(180,200,230,.6)',maxWidth:420,textAlign:'center',lineHeight:1.75}}>
        {region.lore}
      </p>
      <div className="page-slug">/regions/{region.slug}</div>
    </div>
  );
}

function InteractiveMap({onNavigate}) {
  const [scale, setScale]     = useState(0.68);
  const [offset, setOffset]   = useState([40, 24]);
  const [hovered, setHovered] = useState(null);
  const [active,  setActive]  = useState(null);
  const [panel,   setPanel]   = useState(null);
  const [tooltip, setTooltip] = useState({region:null, x:0, y:0, visible:false});
  const [ripple,  setRipple]  = useState(null);
  const ttTimer = useRef(null);

  useEffect(() => {
    const onKey = e => {
      const map = {ArrowLeft:[60,0],ArrowRight:[-60,0],ArrowUp:[0,60],ArrowDown:[0,-60]};
      if(map[e.key]) { e.preventDefault(); const [dx,dy]=map[e.key]; setOffset(p=>[p[0]+dx,p[1]+dy]); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const onHover = useCallback(r => {
    setHovered(r);
    clearTimeout(ttTimer.current);
    ttTimer.current = setTimeout(() => setTooltip(t => ({...t, region:r, visible:true})), 70);
  }, []);

  const onLeave = useCallback(() => {
    setHovered(null);
    clearTimeout(ttTimer.current);
    setTooltip(t => ({...t, visible:false}));
  }, []);

  const onMouseMove = useCallback(e => {
    setTooltip(t => ({...t, x:e.clientX, y:e.clientY}));
  }, []);

  const onClick = useCallback(r => {
    setRipple({x:r.labelX, y:r.labelY, key:Date.now()});
    setActive(r); setPanel(r);
    setOffset([
      window.innerWidth/2  - r.labelX * scale,
      window.innerHeight/2 - r.labelY * scale,
    ]);
  }, [scale]);

  const transform = `translate(${offset[0]}px,${offset[1]}px) scale(${scale})`;

  return (
    <div className="app-shell" onMouseMove={onMouseMove}>
      <MapViewport scale={scale} setScale={setScale} offset={offset} setOffset={setOffset}>
        <div className="map-transform-layer" style={{transform}}>
          <svg className="map-svg" width={MAP_W} height={MAP_H} viewBox={`0 0 ${MAP_W} ${MAP_H}`}
            xmlns="http://www.w3.org/2000/svg" aria-label="World map" role="img">
            <defs>
              <filter id="img-darken">
                <feColorMatrix type="matrix"
                  values="0.52 0 0 0 0  0 0.52 0 0 0  0 0 0.52 0 0  0 0 0 1 0"/>
              </filter>
            </defs>
            <image href={window.MAP_IMG_B64} x="0" y="0" width={MAP_W} height={MAP_H}
              style={{filter:'url(#img-darken)'}}
              preserveAspectRatio="xMidYMid meet"/>
            <rect x="0" y="0" width={MAP_W} height={MAP_H}
              fill="none" stroke="rgba(2,5,12,0.92)" strokeWidth="110"
              style={{pointerEvents:'none'}}/>
            {REGIONS.map(r => (
              <MapRegion key={r.id} region={r}
                isHovered={hovered?.id===r.id} isActive={active?.id===r.id}
                onHover={onHover} onLeave={onLeave} onClick={onClick} scale={scale}/>
            ))}
            {ripple && (
              <circle key={ripple.key} cx={ripple.x} cy={ripple.y} r="0"
                fill="none" stroke="rgba(200,168,75,0.65)" strokeWidth="1.5"
                className="click-ripple" onAnimationEnd={()=>setRipple(null)}/>
            )}
          </svg>
        </div>
      </MapViewport>
      <div className="vignette-overlay" aria-hidden="true"/>
      <RegionTooltip region={tooltip.region} x={tooltip.x} y={tooltip.y} visible={tooltip.visible}/>
      <div className="ui-chrome" aria-hidden="true">
        <div className="map-title">
          <div className="map-title-text">QIN</div>
          <div className="title-rule"/>
          <div className="map-title-sub">Drag to explore · Scroll to zoom</div>
        </div>
        <Compass/>
        <div className="zoom-controls">
          <button className="zoom-btn" onClick={()=>setScale(s=>clamp(s*1.25,MIN_SCALE,MAX_SCALE))} aria-label="Zoom in" style={{pointerEvents:'all'}}>+</button>
          <button className="zoom-btn" onClick={()=>setScale(s=>clamp(s/1.25,MIN_SCALE,MAX_SCALE))} aria-label="Zoom out" style={{pointerEvents:'all'}}>−</button>
        </div>
      </div>
      <RegionPanel region={panel} onClose={()=>{setPanel(null);setActive(null);}} onNavigate={onNavigate}/>
    </div>
  );
}

function App() {
  const [route, setRoute] = useState(window.location.hash.replace('#','') || '/');
  useEffect(() => {
    const h = () => setRoute(window.location.hash.replace('#','') || '/');
    window.addEventListener('hashchange', h);
    return () => window.removeEventListener('hashchange', h);
  }, []);
  const m = route.match(/^\/regions\/(.+)$/);
  if(m) {
    const r = REGIONS.find(x=>x.slug===m[1]);
    if(r) return <RegionPage region={r} onBack={()=>{window.location.hash='/';}} />;
  }
  return <InteractiveMap onNavigate={r=>{window.location.hash=`/regions/${r.slug}`;}} />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);



</script>
</body>
</html>
